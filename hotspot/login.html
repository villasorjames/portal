<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="-1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0a14" />
    <meta name="description" content="Secure WiFi hotspot access portal." />
    <script>if(window.history&&window.history.replaceState){window.history.replaceState(null,document.title,window.location.href)}</script>
    <title>Internet Hotspot - Log in</title>
    <script>var _ts=Date.now();document.write('<link rel="stylesheet" href="css/style.css?ts='+_ts+'">');document.write('<script src="js/core.js?ts='+_ts+'"><\/script>');</script>
</head>

<body>

    $(if chap-id)
    <form name="sendin" action="$(link-login-only)" method="post" style="display:none">
        <input type="hidden" name="username" />
        <input type="hidden" name="password" />
        <input type="hidden" name="dst" value="$(link-orig)" />
        <input type="hidden" name="popup" value="true" />
    </form>

    <script>document.write('<script src="/md5.js?ts='+_ts+'"><\/script>');</script>
    <script>
        var hsAddress = "$(server-address)";
        var vlanId = "$(interface-name)";
        var userIp = "$(ip)";
        var userMac = "$(mac)";
        var potalError = "$(error)";

        function doLogin() {
            if (loginOption === 0) {
                document.sendin.password.value = hexMD5('$(chap-id)' + "" + '$(chap-challenge)');
            } else {
                document.sendin.password.value = hexMD5('$(chap-id)' + document.sendin.username.value + '$(chap-challenge)');
            }
            document.sendin.submit();
            return false;
        }
        function doLoginMember() {
            document.sendin.username.value = document.memlogin.memusername.value;
            document.sendin.password.value = hexMD5('$(chap-id)' + document.memlogin.mempassword.value + '$(chap-challenge)');
            document.sendin.submit();
            return false;
        }
    </script>
    $(endif)

    <div id="toastContainer" aria-live="polite" aria-atomic="true"></div>

    <div class="page">
        <div class="page-inner">

            <!-- Header -->
            <div class="card card-header">
                <div class="wifi-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
                        <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
                        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
                        <circle cx="12" cy="20" r="1" fill="currentColor"/>
                    </svg>
                </div>
                <h1 id="hotspotName">HOTSPOT</h1>
                <div id="vendoName">JuanFi Vendo 1</div>
                <div class="meta-row">
                    <div class="meta-item">
                        <span class="meta-label">IP</span>
                        <span class="meta-val">$(ip)</span>
                    </div>
                    <div class="meta-sep"></div>
                    <div class="meta-item">
                        <span class="meta-label">MAC</span>
                        <span class="meta-val">$(mac)</span>
                    </div>
                    <div class="meta-sep"></div>
                    <div class="meta-item">
                        <span class="meta-label">EXP</span>
                        <span class="meta-val" id="expiry">--</span>
                    </div>
                    <div class="meta-sep"></div>
                    <div class="meta-item" id="vendoStatus">
                        <span class="meta-label">NODE</span>
                        <span class="vendo-dot"></span>
                    </div>
                </div>
            </div>

            <!-- Session countdown -->
            <div class="card card-timer">
                <div class="timer-status-row">
                    <span class="session-status" id="sessionStatus" style="position:relative">
                        <span class="session-dot" id="sessionDot"></span>
                        <span class="session-label"></span>
                    </span>
                </div>
                <div class="timer-grid" role="timer" aria-label="Session time remaining">
                    <div class="timer-block"><span class="time" id="days">00</span><span class="t-suffix">D</span></div>
                    <span class="t-sep">:</span>
                    <div class="timer-block"><span class="time" id="hours">00</span><span class="t-suffix">H</span></div>
                    <span class="t-sep">:</span>
                    <div class="timer-block"><span class="time" id="minutes">00</span><span class="t-suffix">M</span></div>
                    <span class="t-sep">:</span>
                    <div class="timer-block"><span class="time" id="seconds">00</span><span class="t-suffix">S</span></div>
                </div>
            </div>

            $(if trial == "no")
            <!-- Action row: Resume (hidden until paused) + Insert Coin -->
            <div class="action-row">
                <button type="button" id="resumeWrapper" style="display:none" class="btn-pause" onclick="doResume()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    RESUME
                </button>
                <button type="button" class="btn-extend" onclick="openModal(0)" id="insert-coin-button"
                    user-type="new" aria-label="Insert coin to purchase access">
                    <strong>INSERT COIN</strong>
                    <div id="container-stars"><div id="stars"></div></div>
                    <div id="glow"><div class="circle"></div><div class="circle"></div></div>
                </button>
            </div>

            <!-- Voucher -->
            <div class="card card-voucher">
                <div class="inputBox">
                    <input type="text" id="convertVoucherInput" aria-label="Voucher code">
                    <span>Voucher Code</span>
                </div>
                <button type="button" class="btn-submit" onclick="initConvertVoucher()">SUBMIT</button>
                <div id="gcash-button-wrapper"></div>
            </div>

            $(else)
            <!-- Free trial -->
            <div class="action-row">
                <button type="button" class="btn-extend" onclick="openModal(5)" aria-label="Start free trial">
                    <strong>FREE TRIAL</strong>
                    <div id="container-stars"><div id="stars"></div></div>
                    <div id="glow"><div class="circle"></div><div class="circle"></div></div>
                </button>
            </div>
            $(endif)

            <!-- Footer actions -->
            <div class="footer-row">
                <button type="button" id="memberButton" class="btn-footer" onclick="openModal(1)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    MEMBER
                </button>
                <button type="button" id="ratesButton" class="btn-footer" onclick="openModal(2)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    RATES
                </button>
            </div>

        </div>
    </div>

    <!-- modal[0] : insert coin -->
    <div class="modal" role="dialog" aria-modal="true" aria-label="Insert coin">
        <div class="modal-content">
            <div class="modal-head mb-20"><span>Insert Coin</span></div>
            <div class="modal-body">
                <div>
                    <div class="progress-circle">
                        <svg viewBox="0 0 100 100">
                            <circle class="progress-bg" cx="50" cy="50" r="40"></circle>
                            <circle id="progress-value" class="progress-value" cx="50" cy="50" r="40"
                                stroke-dasharray="251.2" stroke-dashoffset="251.2"></circle>
                        </svg>
                        <div class="progress-text" id="userTime">0h:0m</div>
                    </div>
                    <div class="insert-coin-details p-10 flex-between mb-10">
                        <span>COINS</span>
                        <span id="userCoin">0</span>
                    </div>
                    <div class="insert-coin-details p-10 flex-between">
                        <span>VOUCHER</span>
                        <span id="userCode">******</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" onclick="closeModal(0)" id="cancelInsertCoinButton">Cancel</button>
                <button type="button" id="proceedInsertCoinButton" onclick="loginVoucher()" disabled>I'm done paying</button>
            </div>
        </div>
    </div>

    <!-- modal[1] : member login -->
    <div class="modal" role="dialog" aria-modal="true" aria-label="Member login">
        <div class="modal-content">
            <div class="modal-head"><span>Member Login</span></div>
            <div class="modal-body">
                <form name="memlogin" class="flex-column" action="$(link-login-only)" method="post" $(if chap-id)
                    onSubmit="return doLoginMember()" $(endif)>
                    <input type="hidden" name="dst" value="$(link-orig)" />
                    <input type="hidden" name="popup" value="true" />
                    <input name="memusername" type="text" placeholder="Username" required />
                    <input name="mempassword" type="password" placeholder="Password" required />
                    <input type="submit" value="LOGIN" class="button mt-20" />
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" onclick="closeModal(1)">CLOSE</button>
            </div>
        </div>
    </div>

    <!-- modal[2] : rates -->
    <div class="modal" role="dialog" aria-modal="true" aria-label="WiFi rates">
        <div class="modal-content">
            <div class="modal-head"><span>WiFi Rates</span></div>
            <div class="modal-body">
                <table id="rate-list">
                    <tr>
                        <th>Amount</th>
                        <th>Time</th>
                        <th>Validity</th>
                    </tr>
                </table>
            </div>
            <div class="modal-footer">
                <button type="button" onclick="closeModal(2)">CLOSE</button>
            </div>
        </div>
    </div>

    <!-- modal[3] : select vendo -->
    <div class="modal" role="dialog" aria-modal="true" aria-label="Select vendo">
        <div class="modal-content">
            <div class="modal-head"><span>Select Vendo</span></div>
            <div class="modal-body" id="vendo-list"></div>
            <div class="modal-footer">
                <button type="button" onclick="closeModal(3)">CLOSE</button>
            </div>
        </div>
    </div>

    <!-- modal[4] : notification -->
    <div class="modal" role="alertdialog" aria-modal="true" aria-label="Notification">
        <div class="modal-content" style="width:90%">
            <div class="modal-body-notification p-10">
                <center><h2 id="notificationMessage"></h2></center>
            </div>
        </div>
    </div>

    <!-- modal[5] : free trial -->
    <div class="modal" role="dialog" aria-modal="true" aria-label="Free trial">
        <div class="modal-content">
            <div class="modal-body">
                <center>
                    <div id="trial-image-wrapper" class="mb-20">
                        <img src="img/ads.png" alt="Advertisement">
                    </div>
                    <p>Free trial user (login in <span id="trial-timer">10</span>s)</p>
                </center>
                <a id="trial-link" href="$(link-login-only)?dst=$(link-orig-esc)&amp;username=T-$(mac-esc)"></a>
            </div>
        </div>
    </div>

    <script>document.write('<script src="js/login.js?ts='+_ts+'"><\/script>');</script>

    <script src="http://payments.wifree.network/widgetv2/juanfi/jquery.min.js" async></script>
    <link rel="stylesheet" href="http://payments.wifree.network/widgetv2/juanfi/ewalletvoucher.css">
    <script src="http://payments.wifree.network/widgetv2/juanfi/loadingoverlay.min.js" async></script>
    <script src="http://payments.wifree.network/widgetv2/juanfi/sweetalert2.js" async></script>
    <script src="http://payments.wifree.network/widgetv2/juanfi/ewalletvoucher.js" async></script>

</body>

</html>
