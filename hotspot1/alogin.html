<script>
// The first character of this file MUST be "<script>" so that the
// portal-side XHR check `responseText.split("<script>")[0] == ""`
// continues to treat a successful MikroTik login as success.
// Anything before that tag is interpreted by the portal JS as an
// error message and falsely shown as "Invalid Voucher!".
(function () {
    // Ping the standard captive-portal detection endpoints used by
    // Android / ChromeOS / Windows / iOS so the OS confirms that the
    // network now has internet access and clears the
    // "Sign in to network" notice without the user reloading.
    var probes = [
        'http://connectivitycheck.gstatic.com/generate_204',
        'http://www.google.com/generate_204',
        'http://clients3.google.com/generate_204',
        'http://www.gstatic.com/generate_204',
        'http://www.msftconnecttest.com/connecttest.txt',
        'http://captive.apple.com/hotspot-detect.html'
    ];
    probes.forEach(function (url) {
        try {
            var x = new XMLHttpRequest();
            x.open('GET', url + (url.indexOf('?') < 0 ? '?' : '&') + '_=' + Date.now(), true);
            x.send();
        } catch (e) {}
        try {
            var img = new Image();
            img.src = url + (url.indexOf('?') < 0 ? '?' : '&') + 'i=' + Date.now();
        } catch (e) {}
    });

    setTimeout(function () {
        location.replace('/portal.html');
    }, 600);
})();
</script>
